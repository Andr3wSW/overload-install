<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Extension</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #0f172a;
  color: white;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
.buttons {
  margin: 20px 0;
}
.btn {
  display: inline-block;
  padding: 15px 25px;
  margin: 10px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 18px;
}
.btn:hover {
  background: #1d4ed8;
}
.step {
  margin: 40px 0;
}
.step img {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
}
</style>
</head>
<body>
<div class="container">
  <h1>Download My Chrome Extension</h1>
  
  <div class="buttons">
    <a class="btn" href="extension.zip" download>Download for Windows</a>
    <a class="btn" href="extension.zip" download>Download for Mac</a>
    <a class="btn" href="extension.zip" download>Download for Linux</a>
  </div>

  <h2>How to Install</h2>

  <div class="step">
    <h3>Step 1: Download and Extract</h3>
    <img src="step1.png">
  </div>

  <div class="step">
    <h3>Step 2: Open Chrome Extensions</h3>
    <img src="step2.png">
  </div>

  <div class="step">
    <h3>Step 3: Enable Developer Mode</h3>
    <img src="step3.png">
  </div>

  <div class="step">
    <h3>Step 4: Click Load Unpacked</h3>
    <img src="step4.png">
  </div>

  <div class="step">
    <h3>Step 5: Select the Folder</h3>
    <img src="step5.png">
  </div>

</div>
</body>
</html>
