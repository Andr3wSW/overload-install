<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumoura | Home</title>
<link rel="stylesheet" href="style.css">
</head>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("fade-in");
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll(".card, .section").forEach(el => {
  observer.observe(el);
});
</script>
<body>

<div class="bg"></div>

<!-- NAV -->
<div class="nav">
  <div><b>My Extension</b></div>
  <div>
    <a href="install.html">Install</a>
    <a href="help.html">Help</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1 class="title">My Extension</h1>
  <p class="subtitle">Clean. Fast. Powerful.</p>
  <a href="install.html" class="btn">Download</a>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>Features</h2>

  <div class="card">⚡ Fast</div>
  <div class="card">🧼 Clean UI</div>
  <div class="card">🧠 Smart Tools</div>
</div>

</body>
</html>
